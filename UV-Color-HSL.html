<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UV-Color (HSL)</title>
  <style>
    :root{
      --w: 330px;
      --gap: 8px;
      --bd: #ddd;
      --bg: #f9f9f9;
      --txt: #333;
    }

    /* 3) "단독 웹페이지"처럼 보이게: 여백 최소, 컨테이너만 딱 보이게 */
    html, body{
      margin: 0;
      padding: 0;
      background: #ffffff;
      height: 100%;
    }
    body{
      display: grid;
      place-items: start center;
      padding: 10px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--txt);
    }

    .picker-container{
      width: var(--w);
      padding: 10px;
      background: var(--bg);
      border: 1px solid var(--bd);
      border-radius: 10px;
      box-sizing: border-box;
    }

    /* 1) 상단 긴 프리뷰 바 (실시간 표시) */
    .main-preview{
      width: 100%;
      height: 34px;
      border-radius: 6px;
      border: 1px solid #cfcfcf;
      background: #cab0e2;
      box-sizing: border-box;
      margin-bottom: 8px;
    }

    .form-control{
      width: 100%;
      padding: 6px;
      font-size: 13px;
      border: 1px solid #aaa;
      border-radius: 6px;
      box-sizing: border-box;
      margin-bottom: 8px;
      background: #fff;
    }

    .section-divider{
      margin: 10px 0;
      border-bottom: 1px solid #ccc;
    }

    .slot-container{
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    .color-slot{
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .color-box{
      width: 22px;
      height: 22px;
      padding: 0;
      border: 1px solid #aaa;
      border-radius: 5px;
      cursor: pointer;
      flex-shrink: 0;
      background: transparent;
    }
    .color-box::-webkit-color-swatch-wrapper{ padding: 0; }
    .color-box::-webkit-color-swatch{ border: none; border-radius: 4px; }

    /* 2) HSL 텍스트: 한 줄 고정 */
    .hsl-label{
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      width: 120px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #222;
    }

    .note-input{
      flex: 1;
      min-width: 0;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 12px;
      box-sizing: border-box;
      background: #fff;
    }

    .custom-controls{
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .btn{
      flex: 1;
      padding: 7px 8px;
      font-size: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
    }
    .btn-save{ background-color: #4CAF50; }
    .btn-delete{ background-color: #f44336; }
    .btn:hover{ opacity: 0.9; }
  



/* 👇 추가: 자체 설정창(Modal) 디자인 👇 */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(2px);
      display: none; align-items: center; justify-content: center;
      z-index: 9999;
    }
    .modal-box {
      background: #1e1e24; padding: 20px; border-radius: 12px;
      border: 1px solid #444; width: 280px;
      display: flex; flex-direction: column; gap: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      color: #fff; box-sizing: border-box;
    }
    .modal-box label { font-size: 12px; color: #9aa3ad; font-weight: bold; margin-bottom: -6px; }
    .modal-box input {
      background: #121218; color: #fff; border: 1px solid #444;
      padding: 10px; border-radius: 6px; font-size: 13px; outline: none;
      box-sizing: border-box; width: 100%;
    }
    .modal-box input:focus { border-color: #8fd3ff; }
    .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 5px; }
    .modal-buttons button { padding: 6px 12px; font-size: 13px; border-radius: 6px; cursor: pointer; }
    /* 👆 여기까지 👆 */







</style>
</head>
<body>
<div class="picker-container">
    <div style="display: flex; justify-content: space-between; align-items: center; background: #e8f1fb; padding: 8px 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #d9e1ec;">
      <div style="font-weight: bold; font-size: 12px; color: #1f2937;">☁️ Cloud 동기화</div>
      <div style="display: flex; gap: 4px;">
        <button id="syncSettingBtn" class="btn" style="background:#555; padding: 4px 6px;">⚙️</button>
        <button id="syncUpBtn" class="btn" style="background:#b1a995; padding: 4px 6px; color:#111;">구름저장☁️</button>
        <button id="syncDownBtn" class="btn" style="background:#e7a86b; padding: 4px 6px; color:#111;">불러오기☁️</button>
      </div>
    </div>
    <div id="mainPreview" class="main-preview" title="현재 선택/조정 중인 색상 미리보기"></div>





    <select class="form-control" id="presetSelect">
      <option value="">전문가 색상 조합 (21종)</option>
      <optgroup label="디자이너 추천">
        <option value="#e2d9c2,#c5bba1,#8d806a,#5b5040,#2c261d">미니멀 어스 (5색)</option>
        <option value="#ff5e5b,#d8d8d8,#ffffea,#00cecb,#ffed66,#ffaaaa">레트로 팝 (6색)</option>
        <option value="#d6e2e9,#f4f1de,#bcd4e6,#99c1b9">노르딕 쿨 (4색)</option>
        <option value="#0a192f,#172a45,#203a43,#ffc857,#db9a5b">럭셔리 골드 (5색)</option>
        <option value="#ffb5a7,#fcd5ce,#f8edeb,#f08080,#f4978e">파스텔 드림 (5색)</option>
        <option value="#f8f9fa,#ced4da,#6c757d,#343a40,#212529,#000000">모노크롬 스케일 (6색)</option>
        <option value="#000000,#150050,#3f0071,#fb3640,#00b8ff">네온 사이버 (5색)</option>
      </optgroup>
      <optgroup label="웹페이지 디자인">
        <option value="#ffffff,#f3f4f6,#3b82f6,#1d4ed8,#111827">모던 SaaS (5색)</option>
        <option value="#fbfbf2,#e5f9e0,#a3f7bf,#29bf12">에코 프렌들리 (4색)</option>
        <option value="#ffffff,#f4f6f8,#007bff,#0056b3,#212529">클린 코퍼레이트 (5색)</option>
        <option value="#121212,#1e1e1e,#2d2d2d,#bb86fc,#03dac6,#cf6679">다크 모드 UI (6색)</option>
        <option value="#ffffff,#ffecd1,#ff7e67,#5c4d7d,#2f2fa2">비비드 스타트업 (5색)</option>
        <option value="#fafafa,#fef08a,#f97316,#ea580c">이커머스 웜 (4색)</option>
        <option value="#f0fdfa,#ccfbf1,#14b8a6,#0f766e,#134e4a">신뢰의 블루 (5색)</option>
      </optgroup>
      <optgroup label="모던 게임 배경">
        <option value="#0b0c10,#1f2833,#c5c6c7,#66fcf1,#45a29e">SF 스페이스 (5색)</option>
        <option value="#2d4a22,#4a7c59,#8fc0a9,#c8d5b9,#faf3dd,#e1e8d5">판타지 포레스트 (6색)</option>
        <option value="#2c3e50,#34495e,#7f8c8d,#bdc3c7">포스트 아포칼립스 (4색)</option>
        <option value="#2a0845,#6441a5,#ff512f,#f09819,#f6d365">픽셀 아트 선셋 (5색)</option>
        <option value="#eebb99,#c19a6b,#8b5a2b,#4a2f1d,#21130d">사막의 유적 (5색)</option>
        <option value="#001f3f,#003366,#00509e,#007bb5">심해 탐험 (4색)</option>
        <option value="#120458,#ff007f,#00e5ff,#7a04eb,#ffffff,#ffea00">사이버펑크 골목 (6색)</option>
      </optgroup>
    </select>

    <div class="section-divider"></div>
    <div class="slot-container" id="colorSlots"></div>
    <div class="section-divider"></div>

    <input type="text" id="customName" class="form-control" placeholder="저장할 조합 이름 입력" />
    <div class="custom-controls">
      <button class="btn btn-save" onclick="saveCustomPalette()">저장 (수정)</button>
      <button class="btn btn-delete" onclick="deleteCustomPalette()">삭제</button>
    </div>
    <select class="form-control" id="customSelect">
      <option value="">내 저장 색상 조합 불러오기</option>
</select>
  </div>





  <div class="modal-overlay" id="sync-modal">
    <div class="modal-box">
      <div style="font-weight:bold; font-size:16px; margin-bottom:5px;">☁️ 구름 동기화 설정</div>
      <label>GitHub Token (ghp_...)</label>
      <input type="text" id="modal-token" placeholder="토큰을 입력하세요">
      <label>Gist ID (방 번호)</label>
      <input type="text" id="modal-gistid" placeholder="비워두면 새로 생성됩니다">
      <div class="modal-buttons">
        <button id="modal-cancel" type="button" style="background:#444; border:none; color:#fff;">취소</button>
        <button id="modal-save" type="button" style="background:#8fd3ff; border:none; color:#111;">저장</button>
      </div>
    </div>
  </div>





  <script>

// 창 크기를 380x650으로 자동 조절
// window.resizeTo(380, 500);
window.resizeTo(480, 550);

    const slotContainer = document.getElementById('colorSlots');
    const presetSelect = document.getElementById('presetSelect');
    const customSelect = document.getElementById('customSelect');
    const customNameInput = document.getElementById('customName');
    const mainPreview = document.getElementById('mainPreview');

    const MAX_SLOTS = 6;
    const STORAGE_KEY = 'my_custom_palettes_v4_hsl';

    let activeHex = '#cab0e2';

    function setMainPreview(hex) {
      activeHex = hex;
      mainPreview.style.background = hex;
    }

    function hexToRgb(hex) {
      const h = hex.replace('#', '').trim();
      if (h.length !== 6) throw new Error("HEX must be 6 digits like #RRGGBB");
      const r = parseInt(h.slice(0, 2), 16);
      const g = parseInt(h.slice(2, 4), 16);
      const b = parseInt(h.slice(4, 6), 16);
      return { r, g, b };
    }

    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const d = max - min;

      let h = 0;
      let s = 0;
      const l = (max + min) / 2;

      if (d !== 0) {
        s = d / (1 - Math.abs(2 * l - 1));
        switch (max) {
          case r: h = ((g - b) / d) % 6; break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h = h * 60;
        if (h < 0) h += 360;
      }
      return { h: Math.round(h), s: Math.round(s * 100), l: Math.round(l * 100) };
    }

    function hexToHsl(hex) {
      const { r, g, b } = hexToRgb(hex);
      return rgbToHsl(r, g, b);
    }

    function hslLabelText({h, s, l}) {
      // 공백 제거 + 한 줄 표시
      return `hsl(${h},${s}%,${l}%)`;
    }

    function initSlots() {
      slotContainer.innerHTML = '';
      for (let i = 0; i < MAX_SLOTS; i++) {
        const slot = document.createElement('div');
        slot.className = 'color-slot';

        const colorInput = document.createElement('input');
        colorInput.type = 'color';
        colorInput.className = 'color-box color-input-el';
        colorInput.value = '#ffffff';

        const hslLabel = document.createElement('span');
        hslLabel.className = 'hsl-label';
        hslLabel.textContent = hslLabelText(hexToHsl('#ffffff'));

        const noteInput = document.createElement('input');
        noteInput.type = 'text';
        noteInput.className = 'note-input note-input-el';
        noteInput.placeholder = '메모';

        function syncFromHex(hex) {
          const hsl = hexToHsl(hex);
          hslLabel.textContent = hslLabelText(hsl);
        }

        // ✅ 작은 색상 선택 상자 조정 시: 라벨 + 프리뷰 실시간
        colorInput.addEventListener('input', function() {
          syncFromHex(this.value);
          setMainPreview(this.value);
          presetSelect.value = "";
          customSelect.value = "";
        });

        // ✅ 슬롯을 클릭/포커스할 때도 프리뷰가 그 슬롯 색을 따라감
        slot.addEventListener('pointerdown', () => setMainPreview(colorInput.value));
        noteInput.addEventListener('focus', () => setMainPreview(colorInput.value));
        colorInput.addEventListener('focus', () => setMainPreview(colorInput.value));

        slot.appendChild(colorInput);
        slot.appendChild(hslLabel);
        slot.appendChild(noteInput);
        slotContainer.appendChild(slot);

        syncFromHex('#ffffff');
      }
      loadCustomDropdown();
    }

    function applyDataToSlots(colorArray, noteArray = []) {
      const inputs = document.querySelectorAll('.color-input-el');
      const labels = document.querySelectorAll('.hsl-label');
      const notes = document.querySelectorAll('.note-input-el');

      for (let i = 0; i < MAX_SLOTS; i++) {
        const targetColor = colorArray[i] ? colorArray[i] : '#ffffff';
        inputs[i].value = targetColor;

        const hsl = hexToHsl(targetColor);
        labels[i].textContent = hslLabelText(hsl);

        notes[i].value = noteArray[i] ? noteArray[i] : '';
      }
      setMainPreview(inputs[0]?.value || '#cab0e2');
    }

    presetSelect.addEventListener('change', function(e) {
      if (!e.target.value) return;
      customSelect.value = "";
      applyDataToSlots(e.target.value.split(','), []);
    });

    function getSavedPalettes() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : {};
    }

    function loadCustomDropdown() {
      const palettes = getSavedPalettes();
      customSelect.innerHTML = '<option value="">내 저장 색상 조합 불러오기</option>';
      for (const name in palettes) {
        const option = document.createElement('option');
        option.value = name;
        option.textContent = name;
        customSelect.appendChild(option);
      }
    }

    function saveCustomPalette() {
      const name = customNameInput.value.trim();
      if (!name) return alert("저장할 이름을 입력해주세요.");

      const inputs = document.querySelectorAll('.color-input-el');
      const notes = document.querySelectorAll('.note-input-el');

      const colors = Array.from(inputs).map(input => input.value); // HEX로 저장
      const textNotes = Array.from(notes).map(input => input.value);

      const palettes = getSavedPalettes();
      palettes[name] = { colors, notes: textNotes };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(palettes));

      loadCustomDropdown();
      customSelect.value = name;
      alert(`'${name}' 조합이 메모와 함께 저장되었습니다.`);
    }

    function deleteCustomPalette() {
      const name = customSelect.value;
      if (!name) return alert("삭제할 조합을 아래 목록에서 먼저 선택해주세요.");
      if (confirm(`'${name}' 조합을 삭제하시겠습니까?`)) {
        const palettes = getSavedPalettes();
        delete palettes[name];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(palettes));
        loadCustomDropdown();
        customNameInput.value = "";
        alert("삭제되었습니다.");
      }
    }

    customSelect.addEventListener('change', function(e) {
      const name = e.target.value;
      if (!name) return;
      presetSelect.value = "";
      customNameInput.value = name;

      const palettes = getSavedPalettes();
      const data = palettes[name];
      if (!data) return;

      if (data.colors) applyDataToSlots(data.colors, data.notes || []);
      else applyDataToSlots(data, []);
    });

    initSlots();
    setMainPreview(activeHex);


// 👇👇 여기부터 클라우드 동기화 (Gist) 로직 추가 👇👇
    const SYNC_KEY = 'my_custom_palettes_v4_hsl_sync';
    let syncInfo = JSON.parse(localStorage.getItem(SYNC_KEY) || '{"githubToken":"","gistId":""}');
    function saveSyncInfo() { localStorage.setItem(SYNC_KEY, JSON.stringify(syncInfo)); }

    document.getElementById('syncSettingBtn').addEventListener('click', () => {
      document.getElementById('modal-token').value = syncInfo.githubToken || '';
      document.getElementById('modal-gistid').value = syncInfo.gistId || '';
      document.getElementById('sync-modal').style.display = 'flex';
    });

    document.getElementById('modal-cancel').addEventListener('click', () => {
      document.getElementById('sync-modal').style.display = 'none';
    });

    document.getElementById('modal-save').addEventListener('click', () => {
      syncInfo.githubToken = document.getElementById('modal-token').value.trim();
      syncInfo.gistId = document.getElementById('modal-gistid').value.trim();
      saveSyncInfo();
      document.getElementById('sync-modal').style.display = 'none';
      alert('⚙️ 동기화 설정이 저장되었습니다.');
    });

    document.getElementById('syncUpBtn').addEventListener('click', () => {
      if(!syncInfo.githubToken) return alert("먼저 ⚙️ 버튼을 눌러 GitHub 토큰을 설정해 주세요.");
      const btn = document.getElementById('syncUpBtn');
      const originalText = btn.textContent;
      btn.textContent = "저장중...";

      const palettes = getSavedPalettes(); // 색상 데이터만 가져옴
      const content = JSON.stringify(palettes, null, 2); // ❗토큰은 포함되지 않음❗

      if(!syncInfo.gistId) {
        fetch("https://api.github.com/gists", {
          method: "POST",
          headers: { "Accept": "application/vnd.github+json", "Authorization": `Bearer ${syncInfo.githubToken}` },
          body: JSON.stringify({
            "description": "Color Palette Sync Data",
            "public": false,
            "files": { "palette_data.json": { "content": content } }
          })
        }).then(res => res.json()).then(data => {
          syncInfo.gistId = data.id;
          saveSyncInfo();
          btn.textContent = originalText;
          alert(`새로운 구름 저장소가 만들어졌습니다! ☁️\n\n발급된 Gist ID:\n${data.id}\n\n다른 PC에서 불러올 때 설정(⚙️)에 이 ID를 넣으세요!`);
        }).catch(err => { btn.textContent = originalText; alert("업로드 실패: " + err); });
      } else {
        fetch(`https://api.github.com/gists/${syncInfo.gistId}`, {
          method: "PATCH",
          headers: { "Accept": "application/vnd.github+json", "Authorization": `Bearer ${syncInfo.githubToken}` },
          body: JSON.stringify({ "files": { "palette_data.json": { "content": content } } })
        }).then(res => {
          btn.textContent = originalText;
          if(res.ok) alert("구름에 성공적으로 업데이트 되었습니다! ☁️");
          else alert("업로드 실패. 토큰이나 ID를 다시 확인하세요.");
        }).catch(err => { btn.textContent = originalText; alert("업로드 오류: " + err); });
      }
    });

    document.getElementById('syncDownBtn').addEventListener('click', () => {
      if(!syncInfo.githubToken || !syncInfo.gistId) return alert("먼저 ⚙️ 버튼을 눌러 GitHub 토큰과 Gist ID를 모두 설정해 주세요.");
      const btn = document.getElementById('syncDownBtn');
      const originalText = btn.textContent;
      btn.textContent = "불러오는중...";

      fetch(`https://api.github.com/gists/${syncInfo.gistId}`, {
        headers: { "Accept": "application/vnd.github+json", "Authorization": `Bearer ${syncInfo.githubToken}` }
      }).then(res => res.json()).then(data => {
        btn.textContent = originalText;
        const file = data.files && data.files["palette_data.json"];
        if(file) {
          try {
            const imported = JSON.parse(file.content);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(imported)); // 받은 데이터로 로컬 금고 덮어쓰기
            loadCustomDropdown(); // 드롭다운 새로고침
            alert("구름에서 색상 조합을 성공적으로 불러왔습니다! ☁️");
          } catch(e) { alert("데이터 파싱 오류가 발생했습니다."); }
        } else { alert("저장된 색상 데이터를 찾을 수 없습니다."); }
      }).catch(err => { btn.textContent = originalText; alert("다운로드 오류: " + err); });
    });
    // 👆👆 여기까지 클라우드 동기화 로직 👆👆







  </script>
</body>
</html>
